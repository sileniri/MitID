            <script>
                function submitCoreClientAuthorizationCode(authorizationCode, sessionId) {
                    document.getElementById("AuthCode").value = authorizationCode;
                    document.getElementById("SessionId").value = sessionId;
                    document.getElementById("ccForm").submit();
                }

                function submitSSOAuthorizationCode(ssoSessionId, authorizationCode) {
                    document.getElementById("SSOAuthCode").value = authorizationCode;
                    document.getElementById("SSOSessionId").value = ssoSessionId;
                    document.getElementById("ssoForm").submit();
                }

                function submitError(error) {
                    document.getElementById("error").value = error;
                    document.getElementById("errorForm").submit();
                }

                function submitCancel() {
                    if (navigator.onLine) {
                        document.getElementById("cancelForm").submit();
                    } else {
                        window.close();
                    }
                }

                function cancelAuthenticationCallback() {
                    console.log("cancelAuthenticationCallback has been invoked from Core Client ");
                    submitCancel();
                }

                function identityClaimCallback(user) {
                    console.log("Executing identityClaimCallback. User is " + user);
                    return user !== "";
                }

                function finalizationCallback(authorizationCode) {
                    console.log("finalizationCallback has been invoked from Core Client");
                    submitCoreClientAuthorizationCode(authorizationCode, sessionId);
                }

                function errorCallback(error) {
                    console.log("ErrorCallBack has been invoked from Core Client with error:" + error);
                    submitError(error);
                }

                function initializeCoreClient(ssoSessionId) {
                    console.log("start initializeAuthentication has been invoked from sample broker page");
                    var xhr = new XMLHttpRequest();
                    xhr.onload = function () {
                        let result;
                        if (this.status === 200 && this.responseText.length) {
                            result = JSON.parse(this.responseText);
                            console.log(result);

                            script = document.createElement("script");
                            script.type = "text/javascript";
                            script.async = true;
                            script.crossOrigin = "anonymous";
                            script.src = result.coreClientUrl;
                            script.id = "mitidCoreClient";
                            script.integrity = result.algorithm + "-" + result.checksum;
                            script.onload = function (event) {
                                try {
                                    InitializeCoreClient({
                                        domReference: "coreClientParent",
                                        identityClaimCallback: identityClaimCallback,
                                        finalizationCallback: finalizationCallback,
                                        cancelAuthenticationCallback: cancelAuthenticationCallback,
                                        errorCallback: errorCallback,
                                        aux: result.aux,
                                    });
                                } catch (e) {
                                    submitError("Failed to InitializeCoreClient");
                                }
                            };
                            document.getElementsByTagName("head")[0].appendChild(script);
                        } else {
                            console.log("an error occured during initializeAuthentication");
                            errorCallback("an error occured during initializeAuthentication");
                        }
                    };

                    xhr.onerror = function () {
                        errorCallback("onError in initialize authentication");
                    };

                    xhr.open("POST", "mitid-administrative-idp/v1/initialize");
                    xhr.setRequestHeader("Content-Type", "application/json");
                    if (ssoSessionId !== undefined) {
                        xhr.send(ssoSessionId);
                    } else {
                        xhr.send();
                    }
                }
            </script>
        </form>
    </body>
</html>
